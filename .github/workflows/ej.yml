name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.EJ_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Seoul

          # 1. 3D 입체 잔디 (반년치)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 2. 주력 사용 언어 통계 (html, css, jupyter 제외)
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_languages_details: bytes-size, percentage

          # 3. 깃허브 업적 뱃지 모음 → Projects Classic API 폐기로 제거
          # plugin_achievements: yes

          # 4. 코딩 습관 (facts 끄기 → author undefined 크래시 우회)
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 14
          plugin_habits_facts: no

          # 5. 코드 총 라인 수
          plugin_lines: yes
