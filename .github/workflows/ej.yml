name: Metrics
on:
  # 매일 자정(UTC 기준)에 자동 실행
  schedule: [{cron: "0 0 * * *"}]
  # 내가 원할 때 수동으로 버튼을 눌러서 실행 가능
  workflow_dispatch:
  # 코드를 푸시할 때마다 실행
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@master
        with:
          # 등록한 시크릿 토큰 사용
          token: ${{ secrets.EJ_TOKEN }}
          
          # 만들어질 파일 이름
          filename: github-metrics.svg
          
          # 표시할 기본 항목 설정 (헤더, 활동, 커뮤니티, 레포지토리, 메타데이터)
          base: header, activity, community, repositories, metadata
          
          # 시간대 설정
          config_timezone: Asia/Seoul

          # ==========================================
          # 🌟 추가된 플러그인 목록
          # ==========================================

          # 1. 3D 입체 잔디 (반년치)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 2. 주력 사용 언어 통계 (html, css, jupyter 제외)
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_languages_details: bytes-size, percentage

          # 3. 깃허브 업적 뱃지 모음
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: no

          # 4. 코딩 습관 및 시간대 분석 (최근 14일, 200커밋 기준)
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 14
          plugin_habits_facts: yes

          # 5. 내가 작성한 코드 총 라인 수 (Lines of code)
          plugin_lines: yes
